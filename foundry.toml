[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]

# Compiler / EVM
evm_version = "cancun"
solc_version = "0.8.24"

# Optimization
optimizer = true
optimizer_runs = 200
via_ir = true

# Determinism / Metadata
# Ensures reproducible bytecode and minimal metadata footprint
bytecode_hash = "none"
cbor_metadata = false

# Gas / Runtime Assumptions
# Explicitly disable legacy assumptions
gas_reports = false

# Testing / Fuzzing
[fuzz]
runs = 256   # increased to better cover authorization + expiry paths


[invariant]
runs = 128
depth = 64

# Prevent accidental mainnet broadcast from tests
eth_rpc_url = ""
